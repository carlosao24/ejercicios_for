<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Analytics - Tabla Dinámica</title>
    <link rel="stylesheet" href="multiplicación.css">
    <script src="multiplicación.js"></script>
</head>
<body>

    <main class="container">
        <header class="input-group">
            <input type="number" id="txtCaja1" placeholder="Ingrese el número" class="main-input">
            <div class="button-grid">
                <button class="btn-probar" onclick="generarTabla()">PROBAR</button>
                <button class="btn-reiniciar" onclick="reiniciar()">REINICIAR</button>
            </div>
        </header>

        <div class="display-header">
            <h2 id="numero"><span>TABLAS DE MULTIPLICAR</span></h2>
        </div>

        <section class="table-card" id="contenedorTabla">
            <div class="table-row">
                <span class="welcome-text">INGRESA EL NÚMERO DE LA TABLA QUE NECESITAS</span>
            </div>
        </section>

        <footer class="footer-enterprise">
            <div class="logo-placeholder">
                <img src="img/logo.png" alt="Logo Empresarial">
            </div>
            <p class="created-by">Creado por Carlos López</p>
        </footer>
    </main>

</body>
</html>
